version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: lastcall_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lastcall
      POSTGRES_USER: lastcall
      POSTGRES_PASSWORD: lastcall_dev_pw
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/models/schema.sql:/docker-entrypoint-initdb.d/schema.sql
  redis:
    image: redis:7-alpine
    container_name: lastcall_redis
    restart: unless-stopped
    ports: ["6379:6379"]
    volumes: [redisdata:/data]
volumes:
  pgdata:
  redisdata:
